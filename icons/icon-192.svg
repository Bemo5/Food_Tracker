<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <rect width="192" height="192" rx="40" fill="#1B5E20"/>
  <!-- ring track -->
  <circle cx="96" cy="88" r="56" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="10"/>
  <!-- ring fill (partial arc ~75%) -->
  <circle cx="96" cy="88" r="56" fill="none" stroke="#A5D6A7" stroke-width="10"
    stroke-dasharray="263 88" stroke-dashoffset="70" stroke-linecap="round"
    transform="rotate(-90 96 88)"/>
  <!-- kcal text -->
  <text x="96" y="82" text-anchor="middle" font-family="-apple-system,Helvetica,sans-serif"
    font-size="22" font-weight="900" fill="white">kcal</text>
  <text x="96" y="104" text-anchor="middle" font-family="-apple-system,Helvetica,sans-serif"
    font-size="13" fill="rgba(255,255,255,0.75)">tracker</text>
  <!-- bottom label -->
  <rect x="32" y="155" width="128" height="24" rx="12" fill="rgba(255,255,255,0.15)"/>
  <text x="96" y="172" text-anchor="middle" font-family="-apple-system,Helvetica,sans-serif"
    font-size="13" font-weight="600" fill="white">FOOD TRACKER</text>
</svg>
