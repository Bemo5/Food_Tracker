<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="110" fill="#1B5E20"/>
  <!-- ring track -->
  <circle cx="256" cy="230" r="150" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="26"/>
  <!-- ring fill -->
  <circle cx="256" cy="230" r="150" fill="none" stroke="#A5D6A7" stroke-width="26"
    stroke-dasharray="707 236" stroke-dashoffset="188" stroke-linecap="round"
    transform="rotate(-90 256 230)"/>
  <!-- kcal text -->
  <text x="256" y="218" text-anchor="middle" font-family="-apple-system,Helvetica,sans-serif"
    font-size="60" font-weight="900" fill="white">kcal</text>
  <text x="256" y="275" text-anchor="middle" font-family="-apple-system,Helvetica,sans-serif"
    font-size="34" fill="rgba(255,255,255,0.75)">tracker</text>
  <!-- bottom label -->
  <rect x="86" y="410" width="340" height="58" rx="29" fill="rgba(255,255,255,0.15)"/>
  <text x="256" y="447" text-anchor="middle" font-family="-apple-system,Helvetica,sans-serif"
    font-size="32" font-weight="700" fill="white">FOOD TRACKER</text>
</svg>
